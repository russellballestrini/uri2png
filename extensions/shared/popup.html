<!--
  uri2png browser toy: screenshot any URI via a permacomputer.
  Off by default. Point it at any uri2png instance you run.
  https://github.com/russellballestrini/uri2png
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>uri2png</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 380px;
      background: #ffffff;
      color: #333;
    }

    .header {
      background: linear-gradient(135deg, #2d3436 0%, #636e72 100%);
      color: white;
      padding: 16px 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.5px;
    }

    .header .version {
      font-size: 10px;
      opacity: 0.6;
    }

    .section {
      padding: 12px 20px;
      border-bottom: 1px solid #eee;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin-bottom: 4px;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      font-family: monospace;
      background: #fafafa;
    }

    input[type="text"]:focus,
    input[type="number"]:focus {
      outline: none;
      border-color: #2d3436;
      background: #fff;
    }

    .dimensions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .checkbox-row {
      display: grid;
      grid-template-columns: 18px 1fr;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
    }

    .checkbox-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
    }

    .checkbox-row span {
      font-size: 12px;
    }

    button#capture-btn {
      width: 100%;
      padding: 10px;
      background: #2d3436;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }

    button#capture-btn:hover {
      background: #636e72;
    }

    button#capture-btn:disabled {
      background: #b2bec3;
      cursor: not-allowed;
    }

    .preview {
      display: none;
      padding: 12px 20px;
      text-align: center;
    }

    .preview img {
      max-width: 100%;
      max-height: 200px;
      width: auto;
      border: 1px solid #eee;
      border-radius: 4px;
    }

    .preview-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .preview-actions a,
    .preview-actions button {
      display: block;
      padding: 6px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      border-radius: 4px;
      text-decoration: none;
      border: 1px solid #ddd;
      background: #fafafa;
      color: #333;
      cursor: pointer;
    }

    .preview-actions a:hover,
    .preview-actions button:hover {
      background: #eee;
    }

    .status {
      padding: 8px 20px 12px;
      font-size: 12px;
      color: #888;
      text-align: center;
    }

    .status.error {
      color: #d63031;
    }

    .status.success {
      color: #00b894;
    }

    .settings-toggle {
      font-size: 11px;
      color: #888;
      cursor: pointer;
      text-align: center;
      padding: 8px;
      border: none;
      background: none;
      width: 100%;
    }

    .settings-toggle:hover {
      color: #333;
    }

    .settings {
      display: none;
    }

    .footer {
      padding: 8px 20px 12px;
      text-align: center;
      border-top: 1px solid #eee;
    }

    .footer a {
      color: #636e72;
      text-decoration: none;
      font-size: 11px;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>uri2png</h1>
    <span class="version">permacomputer</span>
  </div>

  <div class="section">
    <label for="uri-input">URI</label>
    <input type="text" id="uri-input" placeholder="https://example.com" spellcheck="false">
  </div>

  <div class="section">
    <label>Endpoint</label>
    <input type="text" id="endpoint-input" placeholder="http://localhost:8080" spellcheck="false">

    <button class="settings-toggle" id="settings-toggle">more options</button>

    <div class="settings" id="settings-panel">
      <div class="dimensions">
        <div>
          <label for="width-input">Width</label>
          <input type="number" id="width-input" value="1280" min="320" max="3840">
        </div>
        <div>
          <label for="height-input">Height</label>
          <input type="number" id="height-input" value="1024" min="240" max="2160">
        </div>
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="fullpage-input">
        <span>Full page capture</span>
      </div>
    </div>

    <button id="capture-btn">Capture</button>
  </div>

  <div class="preview" id="preview-panel">
    <img id="preview-img" alt="Screenshot preview">
    <div class="preview-actions">
      <a id="download-link" download="screenshot.png">Save PNG</a>
      <button id="copy-btn">Copy image</button>
    </div>
  </div>

  <div class="status" id="status"></div>

  <div class="footer">
    <a href="https://github.com/russellballestrini/uri2png" target="_blank">uri2png</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
